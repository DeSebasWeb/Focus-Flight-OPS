# =============================================================================
# Focus Flight Ops - Docker Compose
# =============================================================================
#
# PRIMER USO (dev nuevo que clona el repo):
#   1. Descomentar el servicio 'postgres' de abajo
#   2. $ docker compose up -d
#   3. $ cd Focus-Flight-OPS-backend && npm install
#   4. $ npx prisma migrate deploy && npx prisma db seed
#   5. $ npm run start:dev
#   6. $ cd ../Focus-Flight-OPS-frontend && npm install && npm start
#
# SI YA TIENES POSTGRESQL CORRIENDO (caso actual):
#   El backend se conecta al PostgreSQL existente en localhost:5432
#   $ docker compose up -d backend
#   $ cd Focus-Flight-OPS-frontend && npm start
#
# =============================================================================

services:

  # =========================================================================
  # BASE DE DATOS - PostgreSQL 17
  # =========================================================================
  # DESCOMENTIAR si NO tienes PostgreSQL corriendo.
  # Si ya tienes el contenedor 'postgresql' activo, NO descomentar.
  # =========================================================================
  #
  # postgres:
  #   image: postgres:17
  #   container_name: focus-flight-ops-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: ${DB_USER:-postgres}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-2607}
  #     POSTGRES_DB: ${DB_NAME:-focus_flight_ops}
  #   ports:
  #     - "${DB_PORT:-5432}:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-focus_flight_ops}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - focus-flight-network

  # =========================================================================
  # BACKEND - NestJS API
  # Se conecta al PostgreSQL existente en el host via host.docker.internal
  # =========================================================================
  backend:
    build:
      context: ./Focus-Flight-OPS-backend
      dockerfile: Dockerfile
    container_name: focus-flight-ops-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Usa host.docker.internal para conectar al PostgreSQL del host
      # Si descomentas el servicio postgres, cambia host.docker.internal por postgres
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-2607}@host.docker.internal:5432/${DB_NAME:-focus_flight_ops}?schema=public
      JWT_SECRET: ${JWT_SECRET:-focus-flight-ops-jwt-secret-key-change-in-production-2026}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      PORT: 3001
      OPEN_METEO_BASE_URL: https://api.open-meteo.com/v1
      NODE_ENV: production
    ports:
      - "3001:3001"
    # Si descomentas el servicio postgres, descomentar tambien:
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    networks:
      - focus-flight-network

# Si descomentas el servicio postgres, descomentar tambien:
# volumes:
#   postgres_data:
#     driver: local

networks:
  focus-flight-network:
    driver: bridge
